<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>役員くじ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8F0;--surface:#FFFFFF;--border:#E8DDD0;
  --text:#2C1A0E;--muted:#8C7B6E;--accent:#C4522A;--accent-light:#F5E6DD;
}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 48px}
.wrap{max-width:440px;margin:0 auto}
.header{text-align:center;margin-bottom:28px}
.header .icon{font-size:52px;display:block;margin-bottom:8px}
.header h1{font-size:22px;font-weight:700;letter-spacing:.05em}
.header p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.7}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.card-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;margin-bottom:12px}
input[type=text]{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--accent)}
.name-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.name-num{width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.roles-row{display:flex;flex-wrap:wrap;gap:8px}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 13px;font-size:12px;font-weight:500;border:1px solid}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:transform .1s,opacity .1s;letter-spacing:.03em}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:disabled{opacity:.35;cursor:default}
.share-box{background:var(--accent-light);border:2px dashed var(--accent);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center}
.share-box p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.share-url{font-size:11px;color:var(--text);word-break:break-all;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:12px;line-height:1.7;font-family:monospace;text-align:left}
.name-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px;border-radius:14px;border:1px solid var(--border);background:var(--surface);font-family:inherit;cursor:pointer;margin-bottom:10px;transition:transform .1s,border-color .15s,background .15s;text-align:left}
.name-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.name-btn:active{transform:scale(.97)}
.name-btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.name-btn .dice{font-size:28px}
.name-btn .lbl{font-size:16px;font-weight:700}
.name-btn .sub{font-size:12px;color:var(--muted)}
.result-reveal{border-radius:20px;padding:32px 20px;text-align:center;margin-bottom:16px;border:2px solid;animation:pop .45s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.result-reveal .big-emoji{font-size:64px;display:block;margin-bottom:12px;animation:bounce .7s ease .5s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.result-reveal .who{font-size:14px;opacity:.75;margin-bottom:4px}
.result-reveal .role-name{font-size:26px;font-weight:700}
.all-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px}
.all-row .em{font-size:24px}
.all-row .n{font-size:13px;opacity:.7}
.all-row .r{font-size:15px;font-weight:700}
.tab-row{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:background .12s,color .12s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.screen{display:none}
.screen.active{display:block}
.hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.7;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <span class="icon">🎰</span>
    <h1>役員くじ</h1>
  </div>

  <!-- タブ -->
  <div class="tab-row" id="tab-row">
    <button class="tab active" onclick="switchTab('host')">幹事（設定）</button>
    <button class="tab" onclick="switchTab('player')">参加者（くじを引く）</button>
  </div>

  <!-- 幹事画面 -->
  <div id="tab-host" class="screen active">
    <div class="card">
      <div class="card-label">参加者の名前（4人）</div>
      <div class="name-row"><div class="name-num">1</div><input type="text" id="n0" placeholder="例：田中さん"></div>
      <div class="name-row"><div class="name-num">2</div><input type="text" id="n1" placeholder="例：鈴木さん"></div>
      <div class="name-row"><div class="name-num">3</div><input type="text" id="n2" placeholder="例：佐藤さん"></div>
      <div class="name-row" style="margin-bottom:0"><div class="name-num">4</div><input type="text" id="n3" placeholder="例：山田さん"></div>
    </div>
    <div class="card">
      <div class="card-label">今回の役職</div>
      <div class="roles-row">
        <span class="pill" style="background:#E1F5EE;color:#085041;border-color:#9FE1CB">📝 書記</span>
        <span class="pill" style="background:#FAEEDA;color:#633806;border-color:#FAC775">💰 会計</span>
        <span class="pill" style="background:#FAECE7;color:#4A1B0C;border-color:#F5C4B3">🎃 ハロウィン係</span>
        <span class="pill" style="background:#EEEDFE;color:#26215C;border-color:#CECBF6">🎉 菅刈フェスティバル係</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="generateUrl()">LINEで送るURLを生成する</button>
    <div id="share-area" style="display:none;margin-top:16px">
      <div class="share-box">
        <p>このURLをそのままLINEに貼って送るだけ！<br>全員が各自のスマホで開いてくじを引けるよ</p>
        <div class="share-url" id="share-url-text"></div>
        <button class="btn btn-primary" onclick="copyUrl()" id="copy-btn">URLをコピーする</button>
      </div>
    </div>
  </div>

  <!-- 参加者画面 -->
  <div id="tab-player" class="screen">
    <div id="step-pick">
      <p style="font-size:14px;color:var(--muted);margin-bottom:16px;text-align:center">自分の名前を選んでタップ！</p>
      <div id="name-buttons"></div>
      <div id="result-area"></div>
      <div style="margin-top:8px">
        <button class="btn btn-secondary" onclick="toggleAll()" id="show-all-btn">全員の結果を見る</button>
      </div>
      <div id="all-area" style="display:none;margin-top:12px"></div>
    </div>
  </div>

</div>

<script>
const ROLES=[
  {label:'書記',           emoji:'📝',bg:'#E1F5EE',text:'#085041',border:'#1D9E75'},
  {label:'会計',           emoji:'💰',bg:'#FAEEDA',text:'#633806',border:'#BA7517'},
  {label:'ハロウィン係',      emoji:'🎃',bg:'#FAECE7',text:'#4A1B0C',border:'#993C1D'},
  {label:'菅刈フェスティバル係',emoji:'🎉',bg:'#EEEDFE',text:'#26215C',border:'#534AB7'},
];

function seededShuffle(arr,seed){
  const a=[...arr];let s=seed>>>0;
  function rng(){s=Math.imul(s,1664525)+1013904223>>>0;return s/0x100000000}
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function hashStr(str){
  let h=2166136261>>>0;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}
  return h;
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['host','player'][i]===tab));
  document.getElementById('tab-host').classList.toggle('active',tab==='host');
  document.getElementById('tab-player').classList.toggle('active',tab==='player');
}

function generateUrl(){
  const ns=[0,1,2,3].map(i=>{
    const v=document.getElementById('n'+i).value.trim();
    return v||['Aさん','Bさん','Cさん','Dさん'][i];
  });
  const seed=(Date.now()%0xFFFFFF).toString(36);
  const encoded=ns.map(n=>encodeURIComponent(n)).join(',');
  const url=location.href.split('?')[0].split('#')[0]+'?n='+encoded+'&s='+seed;
  document.getElementById('share-url-text').textContent=url;
  document.getElementById('share-area').style.display='block';
  document.getElementById('copy-btn')._url=url;
}

function copyUrl(){
  const url=document.getElementById('share-url-text').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='コピーしました！';
    setTimeout(()=>{b.textContent='URLをコピーする';},2000);
  });
}

function getParams(){
  try{
    const p=new URLSearchParams(location.search);
    const n=p.get('n'),s=p.get('s');
    if(!n||!s)return null;
    const names=n.split(',').map(x=>decodeURIComponent(x)).filter(Boolean);
    if(names.length!==4)return null;
    return{names,seed:parseInt(s,36)};
  }catch{return null;}
}

const params=getParams();
if(params){
  // 参加者モード：URLにパラメータがある
  document.getElementById('tab-row').style.display='none';
  document.getElementById('tab-host').classList.remove('active');
  document.getElementById('tab-player').classList.add('active');
  buildPicker(params.names, params.seed);
}

function buildPicker(names,seed){
  const shuffledRoles=seededShuffle(ROLES,seed);
  const shuffledNames=seededShuffle([...names],hashStr(seed.toString()));
  const assignment={};
  shuffledNames.forEach((n,i)=>{assignment[n]=shuffledRoles[i];});

  const container=document.getElementById('name-buttons');
  container.innerHTML='';
  names.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='name-btn';
    btn.innerHTML=`<span class="dice">🎰</span><div><div class="lbl">${name}</div><div class="sub">タップしてくじを引く</div></div>`;
    btn.onclick=()=>{
      document.querySelectorAll('.name-btn').forEach(b=>b.disabled=true);
      const role=assignment[name];
      const res=document.getElementById('result-area');
      res.innerHTML=`<div class="result-reveal" style="background:${role.bg};color:${role.text};border-color:${role.border}">
        <span class="big-emoji">${role.emoji}</span>
        <div class="who">${name}さんの役職は…</div>
        <div class="role-name">${role.label}</div>
      </div>`;
    };
    container.appendChild(btn);
  });

  document.getElementById('all-area')._html=`<div class="card"><div class="card-label">全員の役職</div>${
    shuffledNames.map((n,i)=>{
      const r=shuffledRoles[i];
      return `<div class="all-row" style="background:${r.bg}">
        <span class="em">${r.emoji}</span>
        <div><div class="n" style="color:${r.text}">${n}</div><div class="r" style="color:${r.text}">${r.label}</div></div>
      </div>`;
    }).join('')
  }</div>`;
}

let allVisible=false;
function toggleAll(){
  const area=document.getElementById('all-area');
  const btn=document.getElementById('show-all-btn');
  allVisible=!allVisible;
  if(allVisible){area.style.display='block';area.innerHTML=area._html;btn.textContent='閉じる';}
  else{area.style.display='none';btn.textContent='全員の結果を見る';}
}
</script>
</body>
</html>
